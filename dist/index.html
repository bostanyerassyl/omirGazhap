<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>MapLibre</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" />
    
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-AmYgTRDa.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CCyp6_4T.css">
</head>

<body>
    <div id="map"></div>

    <div id="draw-toolbar" style="
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 50;
">
        <button class="draw-btn" data-mode="simple_select">✋ Select</button>
        <button class="draw-btn" data-mode="draw_point">📍 Point</button>
        <button class="draw-btn" data-mode="draw_line_string">〰 Line</button>
        <button class="draw-btn" data-mode="draw_polygon">⬠ Polygon</button>
        <button id="draw-delete" style="background:#ef4444">🗑 Delete</button>
    </div>

    <div id="sidebar">

        <div id="sidebar-banner">
            <img id="banner-img" alt="Building banner" />
            <div id="banner-placeholder">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Click to add banner image
            </div>
            <button id="banner-remove">✕ Remove</button>
            <input type="file" id="banner-upload" accept="image/*" />
        </div>

        <div id="sidebar-header">
            <div id="sidebar-header-text">
                <!-- Editable title — clicking turns it into an input -->
                <div id="building-name" title="Click to edit">Building</div>
                <input id="building-title-input" placeholder="Enter title…" style="display:none" />
                <div id="building-meta">—</div>
            </div>
            <button id="sidebar-close">✕</button>
        </div>

        <div id="sidebar-body">
            <div class="section" id="feature-section" style="display:none">
                <div class="section-label">Feature</div>
                <div class="prop-grid">
                    <div class="prop-item" style="grid-column: span 2">
                        <div class="prop-key">Title</div>
                        <input class="prop-val" id="feature-title" placeholder="Name this feature…" />
                    </div>
                    <div class="prop-item" style="grid-column: span 2">
                        <div class="prop-key">Color</div>
                        <input type="color" id="feature-color" value="#e74c3c"
                            style="width:100%;height:28px;border:none;background:none;cursor:pointer" />
                    </div>
                    <!-- Inside #feature-section, after the color picker prop-item -->
                    <div class="prop-item" style="grid-column: span 2">
                        <div class="prop-key">Icon</div>
                        <div id="icon-options" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
                            <!-- Unicode icons -->
                            <button class="icon-btn" data-icon="none">✕ None</button>
                            <button class="icon-btn" data-icon="📍">📍</button>
                            <button class="icon-btn" data-icon="⭐">⭐</button>
                            <button class="icon-btn" data-icon="🏠">🏠</button>
                            <button class="icon-btn" data-icon="🏢">🏢</button>
                            <button class="icon-btn" data-icon="⚠️">⚠️</button>
                            <button class="icon-btn" data-icon="🔴">🔴</button>
                            <button class="icon-btn" data-icon="🟢">🟢</button>
                            <button class="icon-btn" data-icon="custom">📁 Custom</button>
                        </div>
                        <input type="file" id="icon-upload" accept="image/*,.svg" style="display:none" />
                    </div>
                </div>
                <textarea id="feature-desc" placeholder="Description…"
                    style="margin-top:8px;width:100%;background:#0f1117;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;resize:vertical;min-height:70px;outline:none"></textarea>
            </div>

            <div class="section">
                <div class="section-label">Description</div>
                <textarea id="desc-textarea" placeholder="Add a description…"></textarea>
            </div>

            <div class="section">
                <div class="section-label">Tags</div>
                <div id="tags-container"></div>
                <input id="tag-input" type="text" placeholder="Type a tag and press Enter…" />
            </div>

            <div class="section">
                <div class="section-label">
                    Properties
                    <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none">
                        (editable — saved per building)
                    </span>
                </div>
                <div class="prop-grid">
                    <div class="prop-item">
                        <div class="prop-key">Levels</div>
                        <input class="prop-val" id="prop-levels" placeholder="—" />
                    </div>
                    <div class="prop-item">
                        <div class="prop-key">Type</div>
                        <input class="prop-val" id="prop-type" placeholder="—" />
                    </div>
                    <div class="prop-item">
                        <div class="prop-key">Roof</div>
                        <input class="prop-val" id="prop-roof" placeholder="—" />
                    </div>
                    <div class="prop-item">
                        <div class="prop-key">Min Height</div>
                        <input class="prop-val" id="prop-minheight" placeholder="—" />
                    </div>
                </div>
            </div>

        </div>

        <div id="sidebar-footer">
            <button id="btn-save">Save changes</button>
        </div>

    </div>

    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
</body>

</html>
